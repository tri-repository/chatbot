<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>TRI | ChatBot - JCYL</title>
    <link rel="icon" type="image/png" href="LOGOTRISIN.PNG">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #01579b;
            --bg: #f4f7f4;
            --user-bubble: #e8f5e9;
            --agent-bubble: #ffffff;
            --white: #ffffff;
        }
        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            overflow: hidden;
        }

        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            filter: contrast(1.08) saturate(1.1) sharpen(1);
            -webkit-filter: contrast(1.08) saturate(1.1);
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translate(-50%, -50%) translateZ(0);
        }

        /* ---- PANTALLA DE ACCESO ---- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s ease;
        }
        #lock-screen::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.40);
            z-index: 0;
        }
        .login-card {
            position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 18px 24px 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%; max-width: 300px; text-align: center;
        }
        .login-logo { width: 150px; height: auto; margin-bottom: -10px; display: block; margin-left: auto; margin-right: auto; }
        .login-card h2 { color: var(--primary-dark); margin: 0 0 3px 0; font-size: 1.2rem; }
        .login-card p { color: #111; font-size: 0.82rem; margin-bottom: 18px; }
        .form-group { text-align: left; margin-bottom: 11px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #444; }
        .login-input { width: 100%; padding: 9px 10px; border: 1px solid #ddd; border-radius: 7px; box-sizing: border-box; font-size: 0.92rem; }
        .login-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(46,125,50,0.15); }
        #login-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 11px; border-radius: 7px; font-size: 0.95rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        #login-btn:hover { background: var(--primary-dark); }
        #login-error { color: #d32f2f; font-size: 0.78rem; margin-top: 8px; display: none; }

        /* ---- INTERFAZ DEL CHAT ---- */
        #main-container {
            display: none; flex-direction: column; height: 100vh;
            filter: blur(10px); transition: 0.5s; position: relative;
        }

        header {
            background: white; color: var(--primary-dark);
            padding: 0.2rem; border-bottom: 2px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center; position: relative;
            flex-shrink: 0; z-index: 10;
        }
        header img { height: 100px; width: auto; margin-right: 15px; margin-left: auto; margin-bottom: -15px; }
        .header-titles { margin-right: auto; text-align: left; }
        .header-titles h2 { margin: 0; font-size: 1.2rem; }
        .header-titles small { color: #111; font-size: 0.8rem; }
        .logout-btn { position: absolute; right: 15px; bottom: 32px; background: none; border: none; color: #222; font-size: 0.7rem; cursor: pointer; font-weight: 500; }
        .user-badge { position: absolute; right: 15px; bottom: 50px; font-size: 0.7rem; color: var(--primary); font-weight: 600; }

        #chat-bg {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            display: flex; justify-content: center; align-items: flex-start;
            position: relative; z-index: 5;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #chat-bg::-webkit-scrollbar { display: none; }
        #chat-window {
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 900px; box-sizing: border-box;
        }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background-color: var(--user-bubble); color: #1b5e20; border-bottom-right-radius: 2px; }
        .agent { align-self: flex-start; background-color: var(--agent-bubble); color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }
        .author { font-weight: bold; font-size: 0.75rem; display: block; margin-bottom: 5px; text-transform: uppercase; color: #888; }

        .input-area {
            background: white; padding: 20px;
            border-top: 2px solid var(--primary);
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
            display: flex; justify-content: center;
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .input-box { max-width: 900px; width: 100%; display: flex; gap: 10px; }
        input#query { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 30px; outline: none; }
        input#query:focus { border-color: var(--primary); }
        button#send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button#send-btn:hover { background: var(--primary-dark); }
        button#send-btn:disabled { background: #ccc; cursor: not-allowed; }
        .typing { display: none !important; }

        /* Thinking indicator */
        .thinking-dots { display: flex; gap: 4px; padding: 8px 0; }
        .thinking-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--primary); opacity: 0.4;
            animation: bounce 1.2s infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
    <source src="fondovid4.mp4" type="video/mp4">
</video>

<div id="lock-screen">
    <div class="login-card">
        <img src="LOGOTRISIN.PNG" alt="Logo TRI" class="login-logo">
        <h2>ChatBot TRI</h2>
        <p>Asistente de Territorio Rural Inteligente - JCYL</p>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="user-input" class="login-input" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="pass-input" class="login-input" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Dominio</label>
            <input type="text" id="domain-input" class="login-input" autocomplete="off"
                   onkeypress="if(event.key==='Enter') login()">
        </div>
        <button id="login-btn" onclick="login()">ACCEDER</button>
        <div id="login-error">Introduce dominio, usuario y contraseña.</div>
    </div>
</div>

<div id="main-container">
    <div id="chat-overlay"></div>
    <header>
        <img src="LOGOTRISIN.PNG" alt="Logo">
        <div class="header-titles">
            <h2>TRI | <span style="color: var(--primary);">Territorio Rural Inteligente</span></h2>
            <small>Asistente Virtual - Junta de Castilla y León</small>
        </div>
        <span class="user-badge" id="user-badge"></span>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </header>
    <div id="chat-bg">
        <div id="chat-window"></div>
    </div>
    <div id="status" class="typing">Estoy pensando...</div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="query" placeholder="Escribe tu consulta..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>
</div>

<script>
    const N8N_URL = 'https://unsparse-shapely-mickie.ngrok-free.dev/webhook/f580034d-7d05-4cd6-92c6-9fa26dafdeb9/chat';
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
    let userAuthToken = null;
    let currentUser = null;

    const chatWindow    = document.getElementById('chat-window');
    const chatBg        = document.getElementById('chat-bg');
    const inputField    = document.getElementById('query');
    const sendBtn       = document.getElementById('send-btn');
    const statusLabel   = document.getElementById('status');
    const lockScreen    = document.getElementById('lock-screen');
    const mainContainer = document.getElementById('main-container');
    const errorDiv      = document.getElementById('login-error');
    const userBadge     = document.getElementById('user-badge');
    const bgVideo       = document.getElementById('bg-video');

    function showChatInterface(instant = false) {
        bgVideo.style.display = 'block';
        if (currentUser) {
            userBadge.textContent = currentUser;
        }
        if (instant) {
            lockScreen.style.display = 'none';
            mainContainer.style.display = 'flex';
            mainContainer.style.filter = 'none';
        } else {
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                mainContainer.style.display = 'flex';
                mainContainer.style.filter = 'none';
                inputField.focus();
            }, 500);
        }
        if (chatWindow.children.length === 0) {
            appendMsg("¡Hola! Soy tu asistente de <strong>Territorio Rural Inteligente</strong>. ¿Qué necesitas consultar hoy?", "agent");
        }
    }

    function login() {
        const d = document.getElementById('domain-input').value.trim();
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();

        if (!d || !u || !p) {
            errorDiv.textContent = 'Introduce dominio, usuario y contraseña.';
            errorDiv.style.display = 'block';
            return;
        }

        errorDiv.style.display = 'none';

        // Formato requerido por Keystone: dominio\usuario:password
        userAuthToken = btoa(d + '\\' + u + ':' + p);
        currentUser = d + '\\' + u;

        localStorage.setItem('tri_session_token', userAuthToken);
        localStorage.setItem('tri_session_user', currentUser);

        showChatInterface();
    }

    function logout() {
        localStorage.removeItem('tri_session_token');
        localStorage.removeItem('tri_session_user');
        location.reload();
    }

    (function checkSession() {
        const savedToken = localStorage.getItem('tri_session_token');
        const savedUser  = localStorage.getItem('tri_session_user');
        if (savedToken) {
            userAuthToken = savedToken;
            currentUser   = savedUser;
            showChatInterface(true);
        } else {
            lockScreen.style.display = 'flex';
        }
    })();

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        const formattedText = (type === 'agent') ? marked.parse(text) : text;
        div.innerHTML = '<span class="author">' + (type === 'user' ? 'Tú' : 'Asistente TRI') + '</span>' + formattedText;
        chatWindow.appendChild(div);
        chatBg.scrollTop = chatBg.scrollHeight;
        return div;
    }

    function appendThinking() {
        const div = document.createElement('div');
        div.className = 'msg agent';
        div.id = 'thinking-msg';
        div.innerHTML = '<span class="author">Asistente TRI</span><div class="thinking-dots"><span></span><span></span><span></span></div>';
        chatWindow.appendChild(div);
        chatBg.scrollTop = chatBg.scrollHeight;
    }

    function removeThinking() {
        const t = document.getElementById('thinking-msg');
        if (t) t.remove();
    }

    async function handleChat() {
        const msg = inputField.value.trim();
        if (!msg) return;

        appendMsg(msg, 'user');
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;
        appendThinking();

        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({
                    action: "sendMessage",
                    chatInput: msg,
                    sessionId: sessionId,
                    auth: {
                        user: currentUser ? currentUser.split('\\')[1] : '',
                        domain: currentUser ? currentUser.split('\\')[0] : '',
                        token: userAuthToken
                    }
                })
            });

            removeThinking();

            if (!response.ok) {
                const errorText = await response.text();
                appendMsg("Error " + response.status + ": " + errorText, 'agent');
                return;
            }

            const data = await response.json();
            let reply = Array.isArray(data)
                ? data[0].output
                : (data.output || data.text || data.response);

            appendMsg(reply || "No he recibido respuesta.", 'agent');

        } catch (err) {
            removeThinking();
            appendMsg("Error de conexión con el asistente. Inténtalo de nuevo.", 'agent');
            console.error(err);
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
</script>
</body>
</html>
