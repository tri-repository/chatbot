<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinking Cities | Rural - SATEC</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --bg: #f4f7f4;
            --user-bubble: #e8f5e9;
            --agent-bubble: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: white;
            color: var(--primary-dark);
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); color: #1b5e20; border-bottom-right-radius: 2px; }
        .agent { align-self: flex-start; background-color: var(--agent-bubble); color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }

        .author { font-weight: bold; font-size: 0.75rem; display: block; margin-bottom: 5px; text-transform: uppercase; color: #888; }

        .input-area { background: white; padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: center; }
        .input-box { max-width: 900px; width: 100%; display: flex; gap: 10px; }

        input#query { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 30px; outline: none; transition: 0.3s; }
        input#query:focus { border-color: var(--primary); }

        button#send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .typing { font-size: 0.8rem; color: #666; padding: 5px 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">Thinking Cities | <span style="color: var(--primary);">Rural</span></h2>
    <small>Plataforma de Gestión Inteligente - Acceso Protegido</small>
</header>

<div id="chat-window"></div>
<div id="status" class="typing">Procesando consulta técnica...</div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="query" placeholder="Escribe tu consulta aquí..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script>
    // URL FIJA DE TU TÚNEL NGROK
    const N8N_URL = 'https://unsparse-shapely-mickie.ngrok-free.dev/webhook/f580034d-7d05-4cd6-92c6-9fa26dafdeb9/chat';
    
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('query');
    const sendBtn = document.getElementById('send-btn');
    const statusLabel = document.getElementById('status');

    // Mensaje de bienvenida inicial
    window.onload = () => {
        appendMsg("Bienvenido al asistente de Smart Rural. La conexión es segura. ¿En qué puedo ayudarte?", "agent");
    };

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="author">${type === 'user' ? 'Usuario' : 'SATEC Rural'}</span>${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function handleChat() {
        const msg = inputField.value.trim();
        if(!msg) return;

        appendMsg(msg, 'user');
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;
        statusLabel.style.display = 'block';

        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                    // IMPORTANTE: No enviamos Authorization aquí. 
                    // El navegador detectará el 401 de Ngrok y pedirá el login automáticamente.
                },
                body: JSON.stringify({ 
                    action: "sendMessage",
                    chatInput: msg,
                    sessionId: sessionId 
                })
            });

            if (response.status === 401) {
                appendMsg("Error de autenticación. Por favor, introduce las credenciales de acceso cuando el navegador las solicite.", "agent");
                return;
            }

            const data = await response.json();
            let reply = Array.isArray(data) ? data[0].output : (data.output || data.text);
            
            appendMsg(reply || "No hay respuesta del servidor.", 'agent');

        } catch (err) {
            console.error(err);
            appendMsg("Error crítico de conexión. Asegúrate de que el túnel Ngrok esté activo.", 'agent');
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            statusLabel.style.display = 'none';
            inputField.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>

</body>
</html>
