<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRI | Territorio Rural Inteligente - JCYL</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #01579b;
            --bg: #f4f7f4;
            --user-bubble: #e8f5e9;
            --agent-bubble: #ffffff;
            --white: #ffffff;
        }

        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            overflow: hidden;
        }

        /*=============================================
        =            PANTALLA DE ACCESO               =
        =============================================*/
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary) 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s ease;
        }

        .login-card {
            background: var(--white);
            padding: 25px 35px 35px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%; max-width: 380px; text-align: center;
        }

        /* Imagen en el Login */
        .login-logo {
            width: 200px; /* Más grande */
            height: auto; 
            margin-bottom: -15px; /* Más pegado al texto de abajo */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .login-card h2 { color: var(--primary-dark); margin: 0 0 5px 0; }
        .login-card p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #444; }
        
        .login-input {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }

        #login-btn {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 14px; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        #login-btn:hover { background: var(--primary-dark); }

        #login-error { color: #d32f2f; font-size: 0.8rem; margin-top: 10px; display: none; }

        /*=============================================
        =            INTERFAZ DEL CHAT                =
        =============================================*/
        #main-container {
            display: flex; flex-direction: column; height: 100vh;
            filter: blur(5px); /* Se verá borroso hasta el login */
            transition: 0.5s;
        }

        header {
            background: white; color: var(--primary-dark);
            padding: 0.8rem; border-bottom: 2px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        /* Imagen en la cabecera */
        header img {
            height: 80px; width: auto; margin-right: 15px; margin-bottom: -5px;
        }

        header .header-titles {
            display: flex; flex-direction: column; text-align: left;
        }

        header h2 { margin: 0; font-size: 1.3rem; }
        header small { color: #666; font-size: 0.85rem; }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            max-width: 900px; margin: 0 auto; width: 100%;
        }

        .msg {
            max-width: 80%; padding: 12px 18px; border-radius: 15px;
            font-size: 0.95rem; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); color: #1b5e20; border-bottom-right-radius: 2px; }
        .agent { align-self: flex-start; background-color: var(--agent-bubble); color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }

        .author { font-weight: bold; font-size: 0.75rem; display: block; margin-bottom: 5px; text-transform: uppercase; color: #888; }

        .input-area { background: white; padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: center; }
        .input-box { max-width: 900px; width: 100%; display: flex; gap: 10px; }

        input#query { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 30px; outline: none; }
        input#query:focus { border-color: var(--primary); }

        button#send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .typing { font-size: 0.8rem; color: #666; padding: 5px 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-card">
        <img src="LOGOTRISIN.PNG" alt="Logo TRI JCYL" class="login-logo">
        
        <h2>ChatBot TRI</h2>
        <p>Acceso al Asistente de TRI</p>
        
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="user-input" class="login-input" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="pass-input" class="login-input" autocomplete="current-password" onkeypress="if(event.key==='Enter') login()">
        </div>

        <button id="login-btn" onclick="login()">ENTRAR</button>
        <div id="login-error">Credenciales necesarias para acceso.</div>
    </div>
</div>

<div id="main-container">
    <header>
        <img src="LOGOTRISIN.PNG" alt="Logo TRI JCYL">
        <div class="header-titles">
            <h2 style="margin:0;">TRI | <span style="color: var(--primary);">Territorio Rural Inteligente</span></h2>
            <small>Asistente Virtual - JCYL</small>
        </div>
    </header>

    <div id="chat-window"></div>
    <div id="status" class="typing">Estoy pensando...</div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="query" placeholder="Escribe tu consulta..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>
</div>

<script>
    const N8N_URL = 'https://unsparse-shapely-mickie.ngrok-free.dev/webhook/f580034d-7d05-4cd6-92c6-9fa26dafdeb9/chat';
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
    let userAuthToken = null;

    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('query');
    const sendBtn = document.getElementById('send-btn');
    const statusLabel = document.getElementById('status');
    const lockScreen = document.getElementById('lock-screen');
    const mainContainer = document.getElementById('main-container');

    // Función de Login Visual
    function login() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();

        if (u && p) {
            userAuthToken = btoa(u + ":" + p);
            
            // Ocultar pantalla de bloqueo con animación
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                mainContainer.style.filter = 'none';
                appendMsg(`Hola, soy tu asistente de TRI. ¿En qué puedo ayudarte?`, "agent");
                inputField.focus();
            }, 500);
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        // n8n responde en JSON, pero Gemini responde en Markdown.
        // n8n no lo renderiza por defecto, así que usamos innerHTML.
        div.innerHTML = `<span class="author">${type === 'user' ? 'Tú' : 'Asistente TRI'}</span>${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function handleChat() {
        const msg = inputField.value.trim();
        if(!msg) return;

        appendMsg(msg, 'user');
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;
        statusLabel.style.display = 'block';

        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Basic ' + userAuthToken,
                    // ESTA LÍNEA MATA LA PANTALLA DE ADVERTENCIA
                    'ngrok-skip-browser-warning': '69420' 
                },
                body: JSON.stringify({ 
                action: "sendMessage",
                chatInput: msg,
                sessionId: sessionId 
            })
        });

            // Manejo de errores de autenticación o bloqueo
            if (response.status === 401) {
                appendMsg("Error 401: Usuario o contraseña de n8n incorrectos.", 'agent');
                return;
            }
            if (response.status === 403) {
                appendMsg("Error 403: El acceso está bloqueado por el servidor o ngrok.", 'agent');
                return;
            }

            const data = await response.json();
            let reply = Array.isArray(data) ? data[0].output : (data.output || data.text);
            
            appendMsg(reply || "El servidor no devolvió una respuesta válida.", 'agent');

        } catch (err) {
            console.error(err);
            appendMsg("Error de red. Asegúrate de que n8n y ngrok estén funcionando correctamente.", 'agent');
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            statusLabel.style.display = 'none';
            inputField.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>

</body>
</html>
