<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRI | Territorio Rural Inteligente - JCYL</title>
    
    <link rel="icon" type="image/png" href="LOGOTRISIN.PNG">

    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #01579b;
            --bg: #f4f7f4;
            --user-bubble: #e8f5e9;
            --agent-bubble: #ffffff;
            --white: #ffffff;
        }

        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            overflow: hidden;
        }

        /* --- PANTALLA DE ACCESO --- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Imagen de fondo del paisaje */
            background-image: url('fondopaisajeTRI.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: none; 
            justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s ease;
        }

        /* Overlay semitransparente para mejorar la legibilidad */
        #lock-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .login-card {
            position: relative; /* Para que quede por encima del overlay */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 18px 24px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 300px; /* Más pequeño que los 380px originales */
            text-align: center;
        }

        .login-logo {
            width: 150px; /* Reducido de 200px */
            height: auto; 
            margin-bottom: -10px;
            display: block;
            margin-left: auto; margin-right: auto;
        }

        .login-card h2 {
            color: var(--primary-dark);
            margin: 0 0 3px 0;
            font-size: 1.2rem; /* Ligeramente más pequeño */
        }
        .login-card p {
            color: #666;
            font-size: 0.82rem;
            margin-bottom: 18px;
        }

        .form-group { text-align: left; margin-bottom: 11px; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #444;
        }
        
        .login-input {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #ddd;
            border-radius: 7px;
            box-sizing: border-box;
            font-size: 0.92rem;
        }

        #login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 11px;
            border-radius: 7px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        #login-btn:hover { background: var(--primary-dark); }

        #login-error { color: #d32f2f; font-size: 0.78rem; margin-top: 8px; display: none; }

        /* --- INTERFAZ DEL CHAT --- */
        #main-container {
            display: none; 
            flex-direction: column; height: 100vh;
            filter: blur(10px);
            transition: 0.5s;
        }

        header {
            background: white; color: var(--primary-dark);
            padding: 0.2rem; border-bottom: 2px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center; position: relative;
        }

        header img { height: 100px; width: auto; margin-right: 15px; margin-left: auto; margin-bottom: -15px; }

        .header-titles { margin-right: auto; text-align: left; }
        .header-titles h2 { margin: 0; font-size: 1.2rem; }
        .header-titles small { color: #666; font-size: 0.8rem; }

        .logout-btn {
            position: absolute; right: 15px; bottom: 22px;
            background: none; border: none; color: #999;
            font-size: 0.7rem; cursor: pointer;
        }

        /* Contenedor que lleva la imagen de fondo difuminada */
        #chat-bg {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #chat-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('fondopaisajeTRI.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(4px) brightness(0.92);
            transform: scale(1.05); /* evita bordes blancos por el blur */
            z-index: 0;
        }

        /* Overlay muy suave para que los mensajes sean legibles */
        #chat-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(244, 247, 244, 0.55);
            z-index: 1;
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 900px;
            position: relative;
            z-index: 2; /* encima del fondo y el overlay */
            box-sizing: border-box;
        }

        .msg {
            max-width: 80%; padding: 12px 18px; border-radius: 15px;
            font-size: 0.95rem; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); color: #1b5e20; border-bottom-right-radius: 2px; }
        .agent { align-self: flex-start; background-color: var(--agent-bubble); color: #333; border-bottom-left-radius: 2px; border: 1px solid #eee; }

        .author { font-weight: bold; font-size: 0.75rem; display: block; margin-bottom: 5px; text-transform: uppercase; color: #888; }

        .input-area { background: white; padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: center; }
        .input-box { max-width: 900px; width: 100%; display: flex; gap: 10px; }

        input#query { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 30px; outline: none; }
        button#send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .typing { font-size: 0.8rem; color: #666; padding: 5px 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-card">
        <img src="LOGOTRISIN.PNG" alt="Logo TRI" class="login-logo">
        <h2>ChatBot TRI</h2>
        <p>Asistente de Territorio Rural Inteligente</p>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="user-input" class="login-input" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="pass-input" class="login-input" onkeypress="if(event.key==='Enter') login()">
        </div>
        <button id="login-btn" onclick="login()">ENTRAR</button>
        <div id="login-error">Credenciales requeridas.</div>
    </div>
</div>

<div id="main-container">
    <header>
        <img src="LOGOTRISIN.PNG" alt="Logo">
        <div class="header-titles">
            <h2>TRI | <span style="color: var(--primary);">Territorio Rural Inteligente</span></h2>
            <small>Asistente Virtual - Junta de Castilla y León</small>
        </div>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </header>
    <div id="chat-bg">
        <div id="chat-window"></div>
    </div>
    <div id="status" class="typing">Estoy pensando...</div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="query" placeholder="Escribe tu consulta..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>
</div>

<script>
    const N8N_URL = 'https://unsparse-shapely-mickie.ngrok-free.dev/webhook/f580034d-7d05-4cd6-92c6-9fa26dafdeb9/chat';
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
    let userAuthToken = null;

    const chatWindow = document.getElementById('chat-window');
    const inputField = document.getElementById('query');
    const sendBtn = document.getElementById('send-btn');
    const statusLabel = document.getElementById('status');
    const lockScreen = document.getElementById('lock-screen');
    const mainContainer = document.getElementById('main-container');

    function showChatInterface(instant = false) {
        if (instant) {
            lockScreen.style.display = 'none';
            mainContainer.style.display = 'flex';
            mainContainer.style.filter = 'none';
        } else {
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                mainContainer.style.display = 'flex';
                mainContainer.style.filter = 'none';
                inputField.focus();
            }, 500);
        }
        
        if (chatWindow.children.length === 0) {
            appendMsg("¡Hola! Soy tu asistente de <strong>Territorio Rural Inteligente</strong>. ¿Qué necesitas consultar hoy?", "agent");
        }
    }

    function login() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        if (u && p) {
            userAuthToken = btoa(u + ":" + p);
            localStorage.setItem('tri_session_token', userAuthToken);
            showChatInterface();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem('tri_session_token');
        location.reload();
    }

    (function checkSession() {
        const savedToken = localStorage.getItem('tri_session_token');
        if (savedToken) {
            userAuthToken = savedToken;
            showChatInterface(true);
        } else {
            lockScreen.style.display = 'flex';
        }
    })();

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="author">${type === 'user' ? 'Tú' : 'Asistente TRI'}</span>${text}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function handleChat() {
        const msg = inputField.value.trim();
        if(!msg) return;

        appendMsg(msg, 'user');
        inputField.value = '';
        inputField.disabled = true;
        sendBtn.disabled = true;
        statusLabel.style.display = 'block';

        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Basic ' + userAuthToken,
                    'ngrok-skip-browser-warning': 'true' 
                },
                body: JSON.stringify({ action: "sendMessage", chatInput: msg, sessionId: sessionId })
            });

            if (!response.ok) throw new Error(`Error ${response.status}`);

            const data = await response.json();
            let reply = Array.isArray(data) ? data[0].output : (data.output || data.text || data.response);
            appendMsg(reply || "No he recibido respuesta.", 'agent');

        } catch (err) {
            appendMsg("Error de conexión con el asistente.", 'agent');
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            statusLabel.style.display = 'none';
            inputField.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>
</body>
</html>
