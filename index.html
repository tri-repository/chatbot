<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>TRI | ChatBot - JCYL</title>
    <link rel="icon" type="image/png" href="LOGOTRISIN.PNG">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --secondary: #01579b;
            --bg: #1a1a1a; /* Fondo oscuro de respaldo */
            --user-bubble: #e8f5e9;
            --agent-bubble: rgba(255, 255, 255, 0.95);
            --white: #ffffff;
        }

        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
        }

        /* VÍDEO DE FONDO */
        #bg-video {
            position: fixed;
            top: 0; left: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1;
            object-fit: cover;
            filter: blur(10px) brightness(0.6); /* Ajuste de visibilidad */
            transform: scale(1.1);
        }

        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 1000; transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%; max-width: 320px; text-align: center;
        }

        .login-logo { width: 160px; margin-bottom: 10px; }
        .login-card h2 { color: var(--primary-dark); margin-bottom: 5px; }
        
        #main-container {
            display: none; flex-direction: column; height: 100vh;
            position: relative; z-index: 1;
        }

        header {
            background: rgba(255, 255, 255, 0.8); /* Traslúcido */
            backdrop-filter: blur(15px);
            color: var(--primary-dark);
            padding: 10px 20px; border-bottom: 2px solid var(--primary);
            display: flex; align-items: center; z-index: 10;
        }
        header img { height: 80px; margin-left: auto; }

        #chat-bg {
            flex: 1; overflow-y: auto;
            display: flex; justify-content: center;
            scrollbar-width: none;
        }
        #chat-bg::-webkit-scrollbar { display: none; }

        #chat-window {
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 900px;
        }

        /* BURBUJAS DE CHAT */
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .user { align-self: flex-end; background-color: var(--user-bubble); color: #1b5e20; border-bottom-right-radius: 2px; }
        .agent { align-self: flex-start; background-color: var(--agent-bubble); color: #333; border-bottom-left-radius: 2px; }
        
        /* Estilos Markdown dentro de burbujas */
        .agent p { margin: 5px 0; }
        .agent ul { padding-left: 20px; }
        .agent table { border-collapse: collapse; width: 100%; margin: 10px 0; background: white; }
        .agent th, .agent td { border: 1px solid #ddd; padding: 8px; }

        .author { font-weight: bold; font-size: 0.7rem; display: block; margin-bottom: 5px; opacity: 0.6; text-transform: uppercase; }

        .input-area {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px; border-top: 1px solid rgba(0,0,0,0.1);
            display: flex; justify-content: center;
        }
        .input-box { max-width: 900px; width: 100%; display: flex; gap: 10px; }
        input#query { flex: 1; padding: 12px 20px; border: 1px solid #ccc; border-radius: 30px; outline: none; background: white; }
        button#send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .typing { font-size: 0.8rem; color: white; text-align: center; padding: 10px; display: none; text-shadow: 0 0 5px black; }
        .logout-btn { background: none; border: none; color: #666; font-size: 0.7rem; cursor: pointer; text-decoration: underline; margin-left: 10px; }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="fondovid.mp4" type="video/mp4">
</video>

<div id="lock-screen">
    <div class="login-card">
        <img src="LOGOTRISIN.PNG" alt="Logo" class="login-logo">
        <h2>ChatBot TRI</h2>
        <p>Acceso Territorio Rural Inteligente</p>
        <input type="text" id="user-input" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ddd;">
        <input type="password" id="pass-input" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ddd;" onkeypress="if(event.key==='Enter') login()">
        <button id="login-btn" onclick="login()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer;">ACCEDER</button>
        <div id="login-error" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">Error de acceso</div>
    </div>
</div>

<div id="main-container">
    <header>
        <div class="header-titles">
            <h2 style="margin:0">TRI | <span style="color:var(--primary)">Smart City</span></h2>
            <small>Asistente de Gestión JCYL <button class="logout-btn" onclick="logout()">Salir</button></small>
        </div>
        <img src="LOGOTRISIN.PNG" alt="Logo">
    </header>
    
    <div id="chat-bg">
        <div id="chat-window"></div>
    </div>

    <div id="status" class="typing">Procesando consulta...</div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="query" placeholder="Consulta sensores, tráfico o históricos..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>
</div>

<script>
    const N8N_URL = 'https://unsparse-shapely-mickie.ngrok-free.dev/webhook/f580034d-7d05-4cd6-92c6-9fa26dafdeb9/chat';
    const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
    let userAuthToken = null;

    const chatWindow = document.getElementById('chat-window');
    const chatBg     = document.getElementById('chat-bg');
    const inputField = document.getElementById('query');
    const sendBtn    = document.getElementById('send-btn');
    const statusLabel = document.getElementById('status');
    const lockScreen  = document.getElementById('lock-screen');
    const mainContainer = document.getElementById('main-container');

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = 'msg ' + type;
        const author = type === 'user' ? 'Tú' : 'Asistente TRI';
        
        // Renderizado Markdown para el agente
        const htmlContent = (type === 'agent') ? marked.parse(text) : text;
        
        div.innerHTML = `<span class="author">${author}</span>${htmlContent}`;
        chatWindow.appendChild(div);
        chatBg.scrollTo({ top: chatBg.scrollHeight, behavior: 'smooth' });
    }

    async function handleChat() {
        const msg = inputField.value.trim();
        if (!msg) return;

        appendMsg(msg, 'user');
        inputField.value = '';
        inputField.disabled = true;
        statusLabel.style.display = 'block';

        try {
            const response = await fetch(N8N_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Basic ' + userAuthToken
                },
                body: JSON.stringify({ action: "sendMessage", chatInput: msg, sessionId: sessionId })
            });
            const data = await response.json();
            let reply = Array.isArray(data) ? data[0].output : (data.output || data.text);
            appendMsg(reply || "Sin respuesta del servidor.", 'agent');
        } catch (err) {
            appendMsg("Error de conexión.", 'agent');
        } finally {
            inputField.disabled = false;
            statusLabel.style.display = 'none';
            inputField.focus();
        }
    }

    function showChatInterface(instant = false) {
        lockScreen.style.display = 'none';
        mainContainer.style.display = 'flex';
        if (chatWindow.children.length === 0) {
            appendMsg("¡Bienvenido Especialista! ¿Qué área de **Simancas** monitorizamos hoy?", "agent");
        }
    }

    async function login() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        const token = btoa(u + ':' + p);
        
        // Simulación/Verificación rápida con n8n
        userAuthToken = token;
        localStorage.setItem('tri_session_token', token);
        showChatInterface();
    }

    function logout() {
        localStorage.removeItem('tri_session_token');
        location.reload();
    }

    (function init() {
        const saved = localStorage.getItem('tri_session_token');
        if (saved) {
            userAuthToken = saved;
            showChatInterface(true);
        } else {
            lockScreen.style.display = 'flex';
        }
    })();

    sendBtn.addEventListener('click', handleChat);
    inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>

</body>
</html>
